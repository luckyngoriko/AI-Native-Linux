# AI-OS.NET CI — GitHub Actions Mirror
# Primary CI: self-hosted GitLab at 192.168.1.180 (.gitlab-ci.yml)
# This is a backup mirror — merges are gated by GitLab, not GitHub.

name: AI-OS.NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 02:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94"
  RUSTC_BOOTSTRAP: "0"

jobs:
  # ── STAGE 1: CHECK ──────────────────────────────────────────────
  check:
    name: cargo check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libclang-dev pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace --locked

  # ── STAGE 2: TEST ───────────────────────────────────────────────
  test:
    name: cargo test
    runs-on: ubuntu-24.04
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libclang-dev pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  # ── STAGE 3: LINT ───────────────────────────────────────────────
  clippy:
    name: cargo clippy
    runs-on: ubuntu-24.04
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libclang-dev pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  # ── STAGE 4: BUILD ──────────────────────────────────────────────
  build:
    name: cargo build --release
    runs-on: ubuntu-24.04
    needs: [test, clippy, fmt]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler libclang-dev pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build --release
        run: cargo build --release --workspace --locked

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ github.sha }}
          path: target/release/
          retention-days: 1

  # ── STAGE 5: ASSEMBLE ISO ───────────────────────────────────────
  assemble-iso:
    name: assemble ISO
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ github.sha }}
          path: target/release/

      - name: Install ISO tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xorriso squashfs-tools cpio xz-utils mtools \
            systemd-boot cryptsetup-bin tpm2-tools busybox-static

      - name: Assemble ISO
        run: |
          chmod +x distro/build/build-aios-iso.sh
          CHROOT_WORKDIR="$PWD/target/release" \
            ./distro/build/build-aios-iso.sh --release --output "aios-rev4-${GITHUB_SHA::7}-x86_64.iso"
          ls -lh distro/build/aios-*.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: aios-rev4-${{ github.sha }}
          path: distro/build/aios-rev4-*.iso
          retention-days: 7

  # ── WEEKLY FULL BUILD ──────────────────────────────────────────
  weekly-iso:
    name: weekly ISO build
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential protobuf-compiler \
            libclang-dev pkg-config libssl-dev xorriso squashfs-tools \
            cpio xz-utils mtools systemd-boot cryptsetup-bin tpm2-tools busybox-static

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Full build + test + ISO
        run: |
          chmod +x distro/build/build-aios-iso.sh
          cargo build --release --workspace --locked
          cargo test --workspace --no-fail-fast
          ./distro/build/build-aios-iso.sh --release

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: aios-rev4-weekly-${{ github.run_id }}
          path: distro/build/aios-rev4-*.iso
          retention-days: 30
