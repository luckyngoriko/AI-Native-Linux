// AIOS S10.1 â€” Capability Runtime internal gRPC service surface (T-033).
//
// This file is the canonical proto3 IDL for the L3-internal
// `aios.runtime.v1alpha1.CapabilityRuntime` service defined in
// `002.AI-OS.NET--SPECREV.2/L3_AIOS_SGR_Service_Graph_Runtime/`
// `03_capability_runtime_grpc.md` Â§5 (service surface), Â§3 (vocabulary), Â§10
// (adapter manifest), and Â§6 (execute path).
//
// Stability:
//   - Package name `aios.runtime.v1alpha1` matches the schema declaration in
//     S10.1 Â§5.1. The `v1alpha1` suffix communicates the wire is still
//     ratifying.
//   - The nine-RPC surface is closed per Â§5.1. Adding an RPC is a versioned
//     spec change.
//
// Rust integration:
//   - `crates/aios-capability-runtime/build.rs` invokes `tonic-build` to
//     generate Rust server + client stubs (`capability_runtime_server::CapabilityRuntime`
//     trait + `CapabilityRuntimeServer<T>` transport; `capability_runtime_client::CapabilityRuntimeClient`).
//     The build script mirrors `crates/aios-policy/build.rs` (T-023) and
//     `crates/aios-evidence/build.rs` (T-011).
//   - The Rust value types in `crates/aios-capability-runtime/src/{status,
//     dispatch,failure,adapter_manifest,context}.rs` are the spec-typed
//     mirrors of the proto messages below; `src/service/conversions.rs`
//     owns the bidirectional Rust â†” proto translation.
//
// Cross-crate envelope placeholder:
//   - `ValidateActionRequest.envelope_proto` and `GetActionStatusResponse.envelope_proto`
//     are declared as `bytes` per spec but until `aios-action` ships its own
//     proto IDL (open task #26 in the .ai tracker), the in-tree wire format
//     for those bytes is the canonical JSON serde representation of
//     `aios_action::ActionEnvelope`. The conversion module is the single touch
//     point when the swap-in lands. This pattern matches `aios-policy`
//     `EvaluatePolicyRequest.envelope_proto` verbatim.

syntax = "proto3";
package aios.runtime.v1alpha1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

