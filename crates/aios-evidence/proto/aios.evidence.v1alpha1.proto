// AIOS S3.1 — Evidence Log gRPC service surface (T-011 / canonical wire contract).
//
// This file is the verbatim Appendix A IDL from
// `002.AI-OS.NET--SPECREV.2/L9_Observability_Admin_Operations/01_evidence_log.md`.
// The fenced Appendix A `proto` block is the canonical source of truth — see §9
// (RPC list) and §17 (service surface gating). The duration import below is
// added on top of the spec's three imports because `ModelCallPayload.duration`
// uses `google.protobuf.Duration`; without it the file would not compile under
// `protoc`. This is a transcription fix, not a contract change.
//
// Stability:
//   - Package name `aios.evidence.v1alpha1` matches the schema declaration in
//     S3.1 §3 + §17. The `v1alpha1` suffix communicates the wire is still
//     ratifying (Wave 14+ will reconcile `RecordPayload` to a full one-of per
//     `RecordType`).
//   - Numeric `RecordType` IDs are stable across Waves; new entries are reserved
//     to the 1000..9999 range as documented in the spec.
//
// Rust integration:
//   - `crates/aios-evidence/build.rs` invokes `tonic-build` to generate Rust
//     server stubs (`evidence_log_server::EvidenceLog` trait + `EvidenceLogServer<T>`
//     transport service) and client stubs (`evidence_log_client::EvidenceLogClient`).
//   - The Rust `EvidenceReceipt` envelope in `crates/aios-evidence/src/receipt.rs`
//     is a subset of the proto message (T-007..T-010 implement 10 of 17 fields;
//     the remaining 7 fields are sent on the wire as empty/default values until
//     the carry-forward §22 items are picked up by later milestones). The
//     `src/service/conversions.rs` module owns the Rust↔proto translation.

syntax = "proto3";
package aios.evidence.v1alpha1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/duration.proto";

// ─────────────────────────────────────────────────────────────────
// Receipt envelope
// ─────────────────────────────────────────────────────────────────

message EvidenceReceipt {
  string receipt_id = 1;
  google.protobuf.Timestamp recorded_at = 2;
  RecordType record_type = 3;
  string subject = 4;
  string action_id = 5;
  string policy_decision_id = 6;
  string verification_id = 7;
  string correlation_id = 8;
  string trace_id = 9;
  string segment_id = 10;
  uint64 sequence_number = 11;
  string payload_hash = 12;
  string payload_ref = 13;
  string redaction_profile = 14;
  string previous_receipt_hash = 15;
  bool simulated = 16;
  RecordPayload payload = 17;
}

