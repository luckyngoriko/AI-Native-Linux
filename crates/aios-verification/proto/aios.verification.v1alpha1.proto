syntax = "proto3";

package aios.verification.v1alpha1;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message VerificationIntentProto {
  string intent_id = 1;
  bytes action_id_proto = 2;
  string expression = 3;
  string expression_hash = 4;
  google.protobuf.Timestamp created_at = 5;
  uint32 timeout_seconds = 6;
}

enum VerificationStatusProto {
  VERIFICATION_STATUS_UNSPECIFIED = 0;
  VERIFICATION_PASSED = 1;
  VERIFICATION_FAILED = 2;
  VERIFICATION_TIMEOUT = 3;
  VERIFICATION_PROBE_ERROR = 4;
  VERIFICATION_SKIPPED = 5;
}

enum VerificationPrimitiveProto {
  VERIFICATION_PRIMITIVE_UNSPECIFIED = 0;
  SERVICE_ACTIVE = 1;
  SERVICE_INACTIVE = 2;
  PACKAGE_INSTALLED = 3;
  PORT_OPEN = 4;
  PORT_CLOSED = 5;
  HTTP_OK = 6;
  FILE_EXISTS = 7;
  FILE_HASH = 8;
  REPO_EXISTS = 9;
  AIOSFS_POINTER = 10;
  POLICY_DECISION = 11;
  EVIDENCE_EXISTS = 12;
  NETWORK_SUBJECT_OUTBOUND_CLASS = 13;
  NETWORK_ACTIVE_EXPOSURE_CLASS = 14;
  NETWORK_EXTERNAL_MODEL_CALL_BROKERED_ONLY = 15;
  DNS_RESOLVER_BACKEND = 16;
  VPN_TUNNEL_ACTIVE = 17;
  MDNS_POSTURE = 18;
  AIOSFS_PATH_IN_NAMESPACE = 19;
  SURFACE_IN_ZONE = 20;
  TREE_CONTAINS_KIND = 21;
  TREE_MAX_DEPTH = 22;
  THEME_SATISFIES_INVARIANTS = 23;
  THEME_CONSTITUTIONAL_ICONS_INTACT = 24;
  GPU_BINDING_CLASS = 25;
  WEB_RENDERER_BOUND_TO = 26;
  WEB_CHROME_Z_INDEX_AT_LEAST = 27;
  AIOSFS_PATH_OWNER_RESOLVED = 28;
  AIOSFS_PATH_RECOVERY_TREATMENT_SET = 29;
  NAMESPACE_CATALOG_VERSION = 30;
  STATUS_INDICATOR_VISIBLE = 31;
  SUBJECT_SESSION_FLAG_STATE = 32;
  FILESYSTEM_ROOT_INTACT = 33;
  SPEC_CONSUMES_TABLE = 34;
  APPROVAL_BINDING_STATE = 35;
  SECRET_PATTERN_MATCH = 36;
}

message PrimitiveResultProto {
  VerificationPrimitiveProto primitive_kind = 1;
  bool passed = 2;
  google.protobuf.Value actual = 3;
  google.protobuf.Value expected = 4;
  uint64 elapsed_ms = 5;
  optional string error = 6;
}

message VerificationResultProto {
  string result_id = 1;
  string intent_id = 2;
  bytes action_id_proto = 3;
  VerificationStatusProto status = 4;
  repeated PrimitiveResultProto per_primitive = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  uint64 duration_ms = 8;
  optional string evidence_receipt_id = 9;
}

message RunVerificationRequest {
  string schema_version = 1;
  bytes action_id_proto = 2;
  VerificationIntentProto intent = 3;
  string subject = 4;
  bool simulate = 5;
}

message ExplainResultRequest {
  string verification_id = 1;
}

message ExplainResultResponse {
  VerificationResultProto result = 1;
  string narrative = 2;
  repeated string snapshot_ids = 3;
}

message VerificationEngineInfo {
  string engine_id = 1;
  repeated string supported_schema_versions = 2;
  string default_schema_version = 3;
  repeated string supported_primitives = 4;
  repeated string supported_property_types = 5;
  google.protobuf.Timestamp started_at = 6;
  string code_version = 7;
}

service VerificationEngine {
  rpc RunVerification(RunVerificationRequest) returns (VerificationResultProto);
  rpc ExplainResult(ExplainResultRequest) returns (ExplainResultResponse);
  rpc GetEngineInfo(google.protobuf.Empty) returns (VerificationEngineInfo);
}
