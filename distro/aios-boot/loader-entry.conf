# =============================================================================
# AI-OS.NET systemd-boot Loader Entry
# =============================================================================
# Located at: /boot/loader/entries/aios.conf
# Boot loader: systemd-boot (sd-boot)
# =============================================================================

title   AI-OS.NET (Revision 4)
sort-key aios

# Kernel image — relative to the ESP root (/boot on the ESP)
linux   /vmlinuz-aios

# Initramfs — custom AIOS initramfs with dm-verity + TPM2 support
initrd  /initramfs-aios.img

# Kernel command line:
#
# root=/dev/mapper/aios-root
#   The dm-verity + LUKS2 mapped device (setup by initramfs).
#
# ro
#   Mount root read-only; the overlay provides writable layers.
#
# selinux=1 security=selinux
#   Enable SELinux with full enforcement.
#
# ima_appraise=enforce ima_policy=tcb
#   Integrity Measurement Architecture: appraise all files against stored
#   hashes using the TCB (Trusted Computing Base) policy.
#
# integrity=1
#   Enable Linux integrity subsystem (IMA + EVM).
#
# lockdown=confidentiality
#   Kernel lockdown mode: block features that may leak kernel confidential data
#   (e.g., /dev/mem, kprobes, BPF writes). Kernel modules must be signed.
#
# quiet splash
#   Suppress verbose kernel log output and show AIOS bootsplash.
#
# console=tty0 console=ttyS0,115200
#   Enable both virtual console and serial console (headless-friendly).
#
# audit=1
#   Enable kernel audit subsystem (required for SELinux AVC logging).
#
options root=/dev/mapper/aios-root ro selinux=1 security=selinux ima_appraise=enforce ima_policy=tcb integrity=1 lockdown=confidentiality quiet splash console=tty0 console=ttyS0,115200 audit=1

# =============================================================================
# Fallback entry: AI-OS.NET (Recovery Mode)
# =============================================================================
# To enter recovery mode, select this entry at the boot menu.
# Recovery mode disables dm-verity enforcement, mounts root writable,
# and sets SELinux permissive for troubleshooting.
#
# To create the fallback entry, uncomment below and save as:
#   /boot/loader/entries/aios-recovery.conf
#
# title   AI-OS.NET (Recovery Mode)
# sort-key aios-recovery
# linux   /vmlinuz-aios
# initrd  /initramfs-aios.img
# options root=/dev/mapper/aios-root rw selinux=1 security=selinux enforcing=0 systemd.unit=rescue.target console=tty0 console=ttyS0,115200
